{% extends 'base.html' %}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/edit.css' %}">
{% endblock %}

{% block content %}
<div class="rectangle_8">

    <div class="top_bar">
        <a href="{% url 'items:detail' item.id %}">
            <svg xmlns="http://www.w3.org/2000/svg" width="33" height="33" viewBox="0 0 33 33" fill="none">
            <path d="M20.625 26.125L11 16.5L20.625 6.875" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </a>
        <button type="submit" form="edit-form" class="complete">완료</button>
    </div>

    <form id="edit-form" method="POST" action="{% url 'items:edit' item.id %}" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="frame_131">
            <div class="frame_129">
                <label for="image-input" style="cursor:pointer; width:100%; height:100%; display:flex; justify-content:center; align-items:center;">
                    {% if item.image %}
                        <img id="preview" src="{{ item.image.url }}" alt="{{ item.product_name }}">
                    {% else %}
                        <img id="preview" style="display:none;">
                        <svg id="placeholder" xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none">
                            <path d="M4 5a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V5Z" stroke="#92BDD5" stroke-width="1.5"/>
                            <circle cx="9" cy="10" r="1.5" stroke="#92BDD5" stroke-width="1.5"/>
                            <path d="M6 19l5-5 3 3 4-5 2 2" stroke="#92BDD5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    {% endif %}
                </label>
                <input id="image-input" type="file" name="image" accept="image/*" style="display:none;">
            </div>
        </div>

        <div class="frame_140">
            <div class="frame_139">

                <div class="frame_148">
                    <div class="frame_143">
                        <label class="input_label">카테고리</label>
                        <div class="frame_141">
                            <select name="category" class="input_select">
                                {% for category in categories %}
                                    <option value="{{ category.id }}" {% if item.category.id == category.id %}selected{% endif %}>
                                        {{ category.name }}
                                    </option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>

                    <div class="frame_147">
                        <label class="input_label">아이템 이름</label>
                        <div class="frame_144">
                            <input type="text" name="product_name" value="{{ item.product_name }}" class="input_text" maxlength="20">
                        </div>
                    </div>
                </div>

                <div class="link_label">링크</div>
                <input type="text" name="product_url" value="{{ item.product_url }}" class="input_link">

            </div>

            <div class="moa_talk">
                <div class="frame_37">
                    <div class="frame_30">
                        <svg xmlns="http://www.w3.org/2000/svg" width="27" height="27" viewBox="0 0 27 27" fill="none">
                        <path d="M6 14.25V8.25H3.75C3.15326 8.25 2.58097 8.48705 2.15901 8.90901C1.73705 9.33097 1.5 9.90326 1.5 10.5V24C1.50112 24.1393 1.541 24.2755 1.61518 24.3934C1.68936 24.5113 1.79491 24.6062 1.92 24.6675C2.04051 24.7223 2.17338 24.7442 2.30511 24.7311C2.43683 24.7179 2.56273 24.6701 2.67 24.5925L6.5325 21.75H16.6125C16.8968 21.7584 17.1797 21.7084 17.4438 21.603C17.708 21.4976 17.9476 21.3391 18.148 21.1373C18.3484 20.9355 18.5052 20.6947 18.6088 20.4298C18.7123 20.165 18.7604 19.8817 18.75 19.5975V18.75H10.5C9.30653 18.75 8.16193 18.2759 7.31802 17.432C6.47411 16.5881 6 15.4435 6 14.25Z" fill="#BEDFF1"/>
                        <path d="M23.25 3H10.5C9.90326 3 9.33097 3.23705 8.90901 3.65901C8.48705 4.08097 8.25 4.65326 8.25 5.25V14.25C8.25 14.8467 8.48705 15.419 8.90901 15.841C9.33097 16.2629 9.90326 16.5 10.5 16.5H20.6625L24.2475 19.2825C24.3541 19.3613 24.4796 19.4104 24.6114 19.4249C24.7431 19.4394 24.8763 19.4187 24.9975 19.365C25.1251 19.3042 25.233 19.2086 25.3086 19.0892C25.3843 18.9697 25.4246 18.8314 25.425 18.69V5.25C25.4253 4.66603 25.1986 4.10482 24.7927 3.68495C24.3869 3.26508 23.8336 3.01947 23.25 3Z" fill="#BEDFF1"/>
                        </svg>
                    </div>
                    <div class="frame_36">
                        <div class="frame_33">모아의 한마디</div>
                        <div class="frame_33">{{ quote }}</div>
                    </div>
                </div>
            </div>

        </div>

    </form>

    <div class="nav_bar">

        <div class="rectangle_23">

            <div class="frame_24">

                <a href="{% url 'items:main' %}" class="frame_20">
                    <div class="frame_19">
                        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="25" viewBox="0 0 22 25" fill="none">
                            <path d="M0 21.3125V8.9375C0 8.50208 0.0976247 8.08958 0.292875 7.7C0.488125 7.31042 0.757167 6.98958 1.1 6.7375L9.35 0.55C9.83125 0.183333 10.3813 0 11 0C11.6187 0 12.1687 0.183333 12.65 0.55L20.9 6.7375C21.2438 6.98958 21.5133 7.31042 21.7085 7.7C21.9037 8.08958 22.0009 8.50208 22 8.9375V21.3125C22 22.0688 21.7305 22.7164 21.1915 23.2554C20.6525 23.7944 20.0053 24.0634 19.25 24.0625H15.125C14.7354 24.0625 14.4091 23.9305 14.146 23.6665C13.8829 23.4025 13.7509 23.0762 13.75 22.6875V15.8125C13.75 15.4229 13.618 15.0966 13.354 14.8335C13.09 14.5704 12.7637 14.4384 12.375 14.4375H9.625C9.23542 14.4375 8.90908 14.5695 8.646 14.8335C8.38292 15.0975 8.25092 15.4238 8.25 15.8125V22.6875C8.25 23.0771 8.118 23.4039 7.854 23.6679C7.59 23.9319 7.26367 24.0634 6.875 24.0625H2.75C1.99375 24.0625 1.34658 23.7935 0.8085 23.2554C0.270416 22.7173 0.000916667 22.0697 0 21.3125Z" fill="url(#paint0_linear_633_823)"/>
                            <defs>
                                <linearGradient id="paint0_linear_633_823" x1="11" y1="0" x2="11" y2="24.0625" gradientUnits="userSpaceOnUse">
                                    <stop stop-color="#96F1FF"/>
                                    <stop offset="1" stop-color="#5A9199"/>
                                </linearGradient>
                            </defs>
                        </svg>
                    </div>
                    <div class="frame_18">홈</div>
                </a>

                <a href="{% url 'items:plus' %}" class="frame_17">
                    <div class="frame_16">
                        <svg xmlns="http://www.w3.org/2000/svg" width="44" height="44" viewBox="0 0 44 44" fill="none">
                            <path d="M23.8332 11.0001C23.8332 10.5139 23.64 10.0475 23.2962 9.70372C22.9524 9.3599 22.4861 9.16675 21.9998 9.16675C21.5136 9.16675 21.0473 9.3599 20.7035 9.70372C20.3597 10.0475 20.1665 10.5139 20.1665 11.0001V20.1667H10.9998C10.5136 20.1667 10.0473 20.3599 9.70348 20.7037C9.35966 21.0475 9.1665 21.5139 9.1665 22.0001C9.1665 22.4863 9.35966 22.9526 9.70348 23.2964C10.0473 23.6403 10.5136 23.8334 10.9998 23.8334H20.1665V33.0001C20.1665 33.4863 20.3597 33.9526 20.7035 34.2964C21.0473 34.6403 21.5136 34.8334 21.9998 34.8334C22.4861 34.8334 22.9524 34.6403 23.2962 34.2964C23.64 33.9526 23.8332 33.4863 23.8332 33.0001V23.8334H32.9998C33.4861 23.8334 33.9524 23.6403 34.2962 23.2964C34.64 22.9526 34.8332 22.4863 34.8332 22.0001C34.8332 21.5139 34.64 21.0475 34.2962 20.7037C33.9524 20.3599 33.4861 20.1667 32.9998 20.1667H23.8332V11.0001Z" fill="white"/>
                        </svg>
                    </div>
                    <div class="frame_15">추가하기</div>
                </a>

                <a href="{% url 'accounts:mypage' %}" class="frame_23">
                    <div class="frame_22">
                        <svg xmlns="http://www.w3.org/2000/svg" width="19" height="27" viewBox="0 0 19 27" fill="none">
                            <path d="M9.28125 0C9.28125 0 0 10.2029 0 17.4217C0 23.1168 3.58617 26.7029 9.28125 26.7029C14.9763 26.7029 18.5625 23.1168 18.5625 17.4217C18.5625 10.2029 9.28125 0 9.28125 0ZM10.3125 23.3514V21.8045C11.3378 21.8033 12.3207 21.3955 13.0457 20.6705C13.7707 19.9455 14.1785 18.9626 14.1797 17.9373H15.7266C15.725 19.3727 15.1541 20.7489 14.1391 21.7639C13.1241 22.7789 11.7479 23.3498 10.3125 23.3514Z" fill="url(#paint0_linear_633_835)"/>
                            <defs>
                                <linearGradient id="paint0_linear_633_835" x1="9.28125" y1="0" x2="9.28125" y2="26.7029" gradientUnits="userSpaceOnUse">
                                    <stop stop-color="#96F1FF"/>
                                    <stop offset="1" stop-color="#5A9199"/>
                                </linearGradient>
                            </defs>
                        </svg>
                    </div>
                    <div class="frame_21">마이</div>
                </a>

            </div>

        </div>

    </div>
</div>

<script>
document.getElementById('image-input').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
        const preview = document.getElementById('preview');
        const placeholder = document.getElementById('placeholder');
        preview.src = e.target.result;
        preview.style.display = '';
        if (placeholder) placeholder.style.display = 'none';
    };
    reader.readAsDataURL(file);
});
</script>

{% endblock %}
